# CONTEXT PATH E PORTA
server.servlet.context-path=/${CTX:be-batch}
#server.port=8086

jwt_secret=${JWT_SECRET:local-dev-only-not-a-real-secret}

# Token del routing per le chiamate interne fra servizi: stesso default degli altri moduli (be-anag/
# be-base/be-google-ai), in produzione va impostato via env TOKEN_CHIAMATE_INTERNE uguale per tutti.
routing.internal-token=${TOKEN_CHIAMATE_INTERNE:eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1c2VyIn0}
security.service.url=${URL_SECURITY_SERVICE:http://localhost:8888/security/info/uri}
enable.security.service=${ENABLE_SECURITY_SERVICE:false}

########## DATABASE ########
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/db_base}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PWD:root}


spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}
########## DATABASE ########


spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000


batch.scheduler.fixed-delay-ms=30000

spring.task.scheduling.pool.size=5

url.application=${SERVICE_BE_BATCH:bebatch-service}
enable.batch.service=${ENABLE_BATCH_SERVICE:false}
batch.service.url=.

# Cifratura delle password di servizio delle schedulazioni (a riposo su DB). In PRODUZIONE passare
# valori reali via variabili d'ambiente e NON committarli. Il salt deve essere una stringa esadecimale.
batch.credentials.secret=${BATCH_CRED_SECRET:change-me-in-produzione}
batch.credentials.salt=${BATCH_CRED_SALT:5c0744940b5c369b}

url.bebase.service=${URL_BEBASE_SERVICE:http://localhost:8082/base}/login/doLoginBatch